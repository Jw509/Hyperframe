<!doctype html>
<html lang="en" data-resolution="portrait">
  <head>
    <meta charset="UTF-8" />
    <title>Final Edit (Shorts) - selecthangerpack2024</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 1080px;
        height: 1920px;
        background: #000;
        overflow: hidden;
        font-family: "Helvetica Neue", "Helvetica", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      #root {
        position: relative;
        width: 1080px;
        height: 1920px;
      }

      #source-video {
        position: absolute;
        inset: 0;
        width: 1080px;
        height: 1920px;
        object-fit: cover;
        object-position: center center;
      }

      /* Liquid-glass / frosted-glass overlay — single card holds both the
         eBay comp screenshot and the RECENT SALE value. Pinned to the
         right edge, mid-screen vertically. Slides in from off-screen right. */
      .sale-card {
        position: absolute;
        left: 819px;
        top: 580px;
        width: 221px;
        padding: 14px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(24px) saturate(140%);
        -webkit-backdrop-filter: blur(24px) saturate(140%);
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow:
          0 10px 26px rgba(0, 0, 0, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.22);
        display: flex;
        flex-direction: column;
        align-items: stretch;
        opacity: 0;
      }

      .sale-card__comp {
        width: 100%;
        aspect-ratio: 0.70;
        border-radius: 15px;
        overflow: hidden;
        background: #ffffff;
        margin-bottom: 12px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      .sale-card__comp img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }

      .sale-card__label {
        font-size: 19px;
        font-weight: 700;
        letter-spacing: 4px;
        color: #ffffff;
        text-transform: uppercase;
        text-align: center;
        margin-top: 2px;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        text-shadow: 0 1px 7px rgba(0, 0, 0, 0.55);
      }

      .sale-card__label::before {
        content: "";
        display: inline-block;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #d4a017;
        box-shadow: 0 0 9px rgba(212, 160, 23, 0.75);
      }

      .sale-card__value {
        font-size: 54px;
        font-weight: 800;
        color: #ffffff;
        line-height: 1;
        letter-spacing: -2px;
        text-align: center;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.45);
      }

      /* Persistent pack-cost / running-total tracker.
         Top-left corner, same liquid-glass treatment as the sale card.
         Fades in at intro_end (t=8s) and stays for the rest of the video. */
      .box-tracker {
        position: absolute;
        left: 40px;
        top: 150px;
        width: 200px;
        padding: 14px 16px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(28px) saturate(140%);
        -webkit-backdrop-filter: blur(28px) saturate(140%);
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow:
          0 10px 24px rgba(0, 0, 0, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.22);
        opacity: 0;
      }

      .box-tracker__row {
        display: flex;
        flex-direction: column;
      }

      .box-tracker__label {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 4px;
        color: rgba(255, 255, 255, 0.7);
        text-transform: uppercase;
        margin-bottom: 4px;
        line-height: 1.25;
      }

      .box-tracker__value {
        font-size: 30px;
        font-weight: 800;
        letter-spacing: -1px;
        line-height: 1;
        text-shadow: 0 1px 8px rgba(0, 0, 0, 0.5);
      }

      .box-tracker__value--cost {
        color: #f87171;
      }

      .box-tracker__value--total {
        color: #4ade80;
      }

      .box-tracker__divider {
        height: 1px;
        background: rgba(255, 255, 255, 0.15);
        margin: 10px 0;
      }

      /* End recap card — full-frame center for the climactic profit reveal.
         Same liquid-glass treatment as the sale-card. */
      .recap-card {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 380px;
        padding: 28px 32px 32px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(28px) saturate(140%);
        -webkit-backdrop-filter: blur(28px) saturate(140%);
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow:
          0 14px 36px rgba(0, 0, 0, 0.35),
          inset 0 1px 0 rgba(255, 255, 255, 0.22);
        display: flex;
        flex-direction: column;
        align-items: center;
        opacity: 0;
      }

      .recap-card__label {
        font-size: 17px;
        font-weight: 600;
        letter-spacing: 6px;
        color: rgba(255, 255, 255, 0.7);
        text-transform: uppercase;
        margin-bottom: 4px;
      }

      .recap-card__value {
        font-size: 58px;
        font-weight: 800;
        color: #ffffff;
        line-height: 1;
        letter-spacing: -2px;
        margin-bottom: 22px;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.45);
      }

      .recap-card__divider {
        width: 70%;
        height: 1px;
        background: rgba(255, 255, 255, 0.18);
        margin: 0 0 22px;
      }

      /* "PROFIT" label stays white for legibility; only the dollar amount
         carries the green/red money color. */
      .recap-card__profit-label {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 8px;
        color: #ffffff;
        text-transform: uppercase;
        margin-top: 6px;
        margin-bottom: 6px;
        text-shadow: 0 1px 8px rgba(0, 0, 0, 0.5);
      }

      .recap-card__profit {
        font-size: 104px;
        font-weight: 900;
        color: #4ade80;
        line-height: 1;
        letter-spacing: -3px;
        text-shadow: 0 4px 24px rgba(74, 222, 128, 0.5);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="final-selecthangerpack2024"
      data-width="1080"
      data-height="1920"
      data-start="0"
      data-duration="52.68"
    >
      <video
        id="source-video"
        class="clip"
        data-start="0"
        data-duration="52.68"
        data-track-index="0"
        muted
        playsinline
        src="../sources/selecthangerpack2024/selecthangerpack2024-cut.mp4"
      ></video>

      <!-- Reveal 1: 0:17 → $3.25 / maye.png -->
      <div id="title-1-card" class="sale-card clip" data-start="5.80" data-duration="2.50" data-track-index="1">
        <div class="sale-card__comp">
          <img src="../comps/selecthangerpack2024-trimmed/maye.png" alt="comp" />
        </div>

      <!-- Reveal 2: 0:29 → $25 / pq.png (money shot, pan) -->
      <div id="title-2-card" class="sale-card clip" data-start="10.70" data-duration="4.70" data-track-index="2" data-pan-y="80">
        <div class="sale-card__comp">
          <img src="../comps/selecthangerpack2024-trimmed/pq.png" alt="comp" />
        </div>
        <div class="sale-card__label">Recent sale</div>

      </div>

      <!-- Reveal 3: src 0:45.2 → $1 / mev.png — no exact sale found, comparable -->
      <div id="title-3-card" class="sale-card clip" data-start="17.80" data-duration="2.50" data-track-index="3">
        <div class="sale-card__comp">
          <img src="../comps/selecthangerpack2024-trimmed/mev.png" alt="comp" />
        </div>
        <div class="sale-card__label">Comparable sale</div>
        <div class="sale-card__value">$1</div>
      </div>

      <!-- Reveal 4: 1:05 → $1.89 / jal.png -->
      <div id="title-4-card" class="sale-card clip" data-start="20.70" data-duration="2.50" data-track-index="4">
        <div class="sale-card__comp">
          <img src="../comps/selecthangerpack2024-trimmed/jal.png" alt="comp" />
        </div>
        <div class="sale-card__label">Recent sale</div>
        <div class="sale-card__value">$1.89</div>
      </div>

      <!-- Reveal 5: 1:17 → $1.89 / ba.png (severe — pan + shrink) -->
      <div id="title-5-card" class="sale-card clip" data-start="24.90" data-duration="2.50" data-track-index="5" data-pan-y="80" data-shrink="0.75">
        <div class="sale-card__comp">
          <img src="../comps/selecthangerpack2024-trimmed/ba.png" alt="comp" />
        </div>
        <div class="sale-card__label">Recent sale</div>
        <div class="sale-card__value">$1.89</div>
      </div>

      <!-- Reveal 6: 1:21 → $0.99 / gro.png -->
      <div id="title-6-card" class="sale-card clip" data-start="27.00" data-duration="2.50" data-track-index="6">
        <div class="sale-card__comp">
          <img src="../comps/selecthangerpack2024-trimmed/gro.png" alt="comp" />
        </div>
        <div class="sale-card__label">Recent sale</div>
        <div class="sale-card__value">$0.99</div>
      </div>

      <!-- Reveal 7: 1:25 → $2.99 / pmo.png (severe — pan + shrink) -->
      <div id="title-7-card" class="sale-card clip" data-start="29.80" data-duration="2.50" data-track-index="7" data-pan-y="80" data-shrink="0.75">
        <div class="sale-card__comp">
          <img src="../comps/selecthangerpack2024-trimmed/pmo.png" alt="comp" />
        </div>
        <div class="sale-card__label">Recent sale</div>
        <div class="sale-card__value">$2.99</div>
      </div>

      <!-- Reveal 8: 1:28 → $1.35 / bro.png (pan) -->
      <div id="title-8-card" class="sale-card clip" data-start="32.10" data-duration="2.50" data-track-index="8" data-pan-y="80">
        <div class="sale-card__comp">
          <img src="../comps/selecthangerpack2024-trimmed/bro.png" alt="comp" />
        </div>
        <div class="sale-card__label">Recent sale</div>
        <div class="sale-card__value">$1.35</div>
      </div>

      <!-- Reveal 9: 1:30 → $1.35 / rdo.png -->
      <div id="title-9-card" class="sale-card clip" data-start="35.40" data-duration="2.50" data-track-index="9">
        <div class="sale-card__comp">
          <img src="../comps/selecthangerpack2024-trimmed/rdo.png" alt="comp" />
        </div>
        <div class="sale-card__label">Recent sale</div>
        <div class="sale-card__value">$1.35</div>
      </div>

      <!-- Reveal 10: 1:33 → $2.99 / jdan.png -->
      <div id="title-10-card" class="sale-card clip" data-start="40.00" data-duration="2.50" data-track-index="10">
        <div class="sale-card__comp">
          <img src="../comps/selecthangerpack2024-trimmed/jdan.png" alt="comp" />
        </div>
        <div class="sale-card__label">Recent sale</div>
        <div class="sale-card__value">$2.99</div>
      </div>

      <!-- Persistent pack-cost / running-total tracker.
           Visible from after the intro montage (cut t=3.7s) until just before
           the recap takes over (55.0s). -->
      <div id="box-tracker" class="box-tracker clip" data-start="3.70" data-duration="41.00" data-track-index="11">
        <div class="box-tracker__row">
          <div class="box-tracker__label">Pack cost</div>
          <div class="box-tracker__value box-tracker__value--cost">$19.99</div>
        </div>
        <div class="box-tracker__divider"></div>
        <div class="box-tracker__row">
          <div class="box-tracker__label">Cards pulled<br>total</div>
          <div class="box-tracker__value box-tracker__value--total" id="box-tracker-total">$0.00</div>
        </div>
      </div>

      <!-- End recap. Appears at cut t=55s — gives reveals 9/10 breathing room
           after their overlays fade before the focus shifts here.
           Holds until end of composition (62.00s). -->
      <div id="recap-card" class="recap-card clip" data-start="45.00" data-duration="7.68" data-track-index="12">
        <div class="recap-card__label">Pack cost</div>
        <div class="recap-card__value">$19.99</div>
        <div class="recap-card__divider"></div>
        <div class="recap-card__label">Total</div>
        <div class="recap-card__value" id="recap-total">$0.00</div>
        <div class="recap-card__divider"></div>
        <div class="recap-card__profit-label" id="recap-profit-label">Profit</div>
        <div class="recap-card__profit" id="recap-profit">+$0.00</div>
      </div>

      <!-- Source audio stripped from cut MP4 itself (cut-source.mjs --no-audio).
           Cardswap SFX fires on each non-comp card flash. Music will be added
           in post. -->
      <audio id="sfx-cardswap-1" class="clip" data-start="8.20"  data-duration="0.53" data-track-index="13" src="../sounds/cardswap.m4a"></audio>
      <audio id="sfx-cardswap-2" class="clip" data-start="8.80"  data-duration="0.53" data-track-index="14" src="../sounds/cardswap.m4a"></audio>
      <audio id="sfx-cardswap-3" class="clip" data-start="42.70" data-duration="0.53" data-track-index="15" src="../sounds/cardswap.m4a"></audio>
      <audio id="sfx-cardswap-4" class="clip" data-start="43.30" data-duration="0.53" data-track-index="16" src="../sounds/cardswap.m4a"></audio>

      <script>
        (function () {
          const IN_DUR = 0.3;
          const OUT_DUR = 0.4;
          const PAN_IN_DUR = 0.5;
          const PAN_OUT_DUR = 0.5;
          const tl = gsap.timeline({ paused: true });

          // Source video pre-zoomed for vertical pan room.
          gsap.set("#source-video", {
            scale: 1.15,
            transformOrigin: "center center",
          });

          // Sale cards live at the right edge — no horizontal centering.
          // Scale-origin pinned to the top-right so data-shrink reduces
          // toward the right edge (the side the card slides in from).
          gsap.set(".sale-card.clip", {
            transformOrigin: "100% 0%",
          });

          // Pre-apply per-element shrink (severe-overlap reveals).
          document.querySelectorAll("[data-shrink]").forEach((el) => {
            gsap.set(el, { scale: Number(el.getAttribute("data-shrink")) });
          });

          // Single-element animation per reveal: slide in from off-screen
          // right + fade in, then slide back out right + fade out.
          document.querySelectorAll(".sale-card.clip").forEach((el) => {
            const start = Number(el.getAttribute("data-start"));
            const dur = Number(el.getAttribute("data-duration"));
            const hold = dur - IN_DUR - OUT_DUR;
            tl.fromTo(
              el,
              { x: 320, opacity: 0 },
              { x: 0, opacity: 1, duration: IN_DUR, ease: "power3.out" },
              start,
            );
            tl.to(
              el,
              { x: 320, opacity: 0, duration: OUT_DUR, ease: "power2.in" },
              start + IN_DUR + hold,
            );
          });

          // Source-video pan keyframes for problem reveals.
          document.querySelectorAll(".sale-card.clip[data-pan-y]").forEach((el) => {
            const start = Number(el.getAttribute("data-start"));
            const dur = Number(el.getAttribute("data-duration"));
            const panY = Number(el.getAttribute("data-pan-y"));
            tl.to(
              "#source-video",
              { y: panY, duration: PAN_IN_DUR, ease: "power2.inOut" },
              Math.max(0, start - 0.3),
            );
            tl.to(
              "#source-video",
              { y: 0, duration: PAN_OUT_DUR, ease: "power2.inOut" },
              start + dur + 0.1,
            );
          });

          // Pack-cost tracker: slide in + fade at intro_end, then animate
          // the running total upward as each reveal hits.
          const tracker = document.getElementById("box-tracker");
          const totalEl = document.getElementById("box-tracker-total");
          if (tracker && totalEl) {
            tl.fromTo(
              tracker,
              { x: -50, opacity: 0 },
              { x: 0, opacity: 1, duration: 0.6, ease: "power3.out" },
              3.7,
            );

            // Read each reveal's start time + value from the DOM so this
            // stays in sync with whatever values are baked into the sale cards.
            const reveals = Array.from(document.querySelectorAll(".sale-card.clip"))
              .map((el) => ({
                start: Number(el.getAttribute("data-start")),
                value:
                  parseFloat(
                    el.querySelector(".sale-card__value").textContent.replace(/[^0-9.]/g, ""),
                  ) || 0,
              }))
              .sort((a, b) => a.start - b.start);

            const counterState = { value: 0 };
            let runningTotal = 0;
            reveals.forEach(({ start, value }) => {
              const newTotal = runningTotal + value;
              tl.to(
                counterState,
                {
                  value: newTotal,
                  duration: 0.6,
                  ease: "power1.out",
                  onUpdate: () => {
                    totalEl.textContent = "$" + counterState.value.toFixed(2);
                  },
                },
                start,
              );
              runningTotal = newTotal;
            });

            // End recap: climactic profit/loss reveal after the last sale fades.
            const recapCard = document.getElementById("recap-card");
            const recapTotalEl = document.getElementById("recap-total");
            const recapProfitEl = document.getElementById("recap-profit");
            const recapProfitLabel = document.getElementById("recap-profit-label");
            const BOX_COST = 19.99;
            const RECAP_START = 45.0;

            if (recapCard && recapTotalEl && recapProfitEl) {
              const finalTotal = runningTotal;
              const profit = finalTotal - BOX_COST;
              const isLoss = profit < 0;

              // Color the profit line red on loss, green on profit.
              if (isLoss) {
                recapProfitEl.style.color = "#f87171";
                recapProfitEl.style.textShadow =
                  "0 4px 24px rgba(248, 113, 113, 0.45)";
                recapProfitLabel.style.color = "#f87171";
                recapProfitLabel.textContent = "Loss";
              }

              // Fully centered (both axes) for the climactic end focus.
              gsap.set(recapCard, {
                xPercent: -50,
                yPercent: -50,
                transformOrigin: "center center",
              });

              // Profit row hidden initially — fades + slides in just before
              // its count-up tween, so we never see "+$0.00" sitting idle.
              gsap.set([recapProfitLabel, recapProfitEl], {
                opacity: 0,
                y: 16,
              });

              // Card fade + scale-pop in.
              tl.fromTo(
                recapCard,
                { opacity: 0, scale: 0.88 },
                {
                  opacity: 1,
                  scale: 1,
                  duration: 0.7,
                  ease: "back.out(1.4)",
                },
                RECAP_START,
              );

              // Total counts up from 0.
              const recapTotalState = { value: 0 };
              tl.to(
                recapTotalState,
                {
                  value: finalTotal,
                  duration: 1.4,
                  ease: "power2.out",
                  onUpdate: () => {
                    recapTotalEl.textContent =
                      "$" + recapTotalState.value.toFixed(2);
                  },
                },
                RECAP_START + 0.4,
              );

              // Reveal profit row right before the count-up so it never
              // sits idle on $0.
              tl.to(
                [recapProfitLabel, recapProfitEl],
                {
                  opacity: 1,
                  y: 0,
                  duration: 0.5,
                  ease: "power3.out",
                  stagger: 0.08,
                },
                RECAP_START + 1.85,
              );

              // Profit counts up.
              const recapProfitState = { value: 0 };
              tl.to(
                recapProfitState,
                {
                  value: profit,
                  duration: 1.2,
                  ease: "power2.out",
                  onUpdate: () => {
                    const v = recapProfitState.value;
                    const sign = v >= 0 ? "+" : "-";
                    recapProfitEl.textContent =
                      sign + "$" + Math.abs(v).toFixed(2);
                  },
                },
                RECAP_START + 2.1,
              );
            }
          }

          window.__timelines = window.__timelines || {};
          window.__timelines["final-selecthangerpack2024"] = tl;
        })();
      </script>
    </div>
  </body>
</html>
